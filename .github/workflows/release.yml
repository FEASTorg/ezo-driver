name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux-x86_64:
    name: Release (linux-x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential jq

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: cmake --preset host-linux-release

      - name: Build
        run: cmake --build --preset host-linux-release --parallel

      - name: Test
        run: ctest --preset host-linux-release

      - name: Install to staging
        run: |
          cmake --install build/host-linux-release \
            --prefix "${{ github.workspace }}/staging"

      - name: Consumer smoke test
        run: |
          mkdir -p build/smoke
          cat > build/smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(ezo_driver_smoke C)
          find_package(ezo_driver CONFIG REQUIRED)
          add_executable(smoke main.c)
          target_link_libraries(smoke PRIVATE ezo::ezo_core)
          EOF
          cat > build/smoke/main.c <<'EOF'
          #include <ezo.h>
          #include <ezo_i2c.h>
          int main(void) { return 0; }
          EOF
          cmake -S build/smoke -B build/smoke/out \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/staging"
          cmake --build build/smoke/out --parallel

      - name: Package binary artifact
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="ezo-driver-${VERSION}-linux-x86_64.tar.gz"
          tar -czf "${ARTIFACT}" -C "${{ github.workspace }}/staging" .
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Package source tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=tar.gz \
            --prefix="ezo-driver-${VERSION}/" \
            -o "ezo-driver-${VERSION}-source.tar.gz" \
            HEAD

      - name: Generate checksums
        run: sha256sum ezo-driver-*.tar.gz > SHA256SUMS

      - name: Generate manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="${{ steps.package.outputs.artifact }}"
          SHA=$(grep "${ARTIFACT}" SHA256SUMS | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "feastorg/ezo-driver" \
            --arg component "ezo_driver" \
            --arg version "${VERSION}" \
            --arg platform "linux-x86_64" \
            --arg asset "${ARTIFACT}" \
            --arg sha256 "${SHA}" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, platform: $platform, asset: $asset, sha256: $sha256}' \
            > manifest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ezo-driver-*.tar.gz
            SHA256SUMS
            manifest.json
          generate_release_notes: true

