name: CI

on:
  push:
  pull_request:

jobs:
  host-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DEZO_BUILD_TESTS=ON
          -DEZO_BUILD_LINUX_ADAPTER=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
